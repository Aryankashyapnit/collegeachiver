kind = "web"
previewPath = "/"
title = "CollegeAchiver"
version = "1.0.0"
id = "artifacts/collegeachiver"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20831

[services.development]
run = "pnpm --filter @workspace/collegeachiver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/collegeachiver", "run", "build" ]
publicDir = "artifacts/collegeachiver/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20831"
BASE_PATH = "/"
